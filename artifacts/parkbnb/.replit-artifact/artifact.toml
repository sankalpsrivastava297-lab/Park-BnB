kind = "web"
previewPath = "/"
title = "ParkBnB"
version = "1.0.0"
id = "artifacts/parkbnb"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18503

[services.development]
run = "pnpm --filter @workspace/parkbnb run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/parkbnb", "run", "build" ]
publicDir = "artifacts/parkbnb/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18503"
BASE_PATH = "/"
